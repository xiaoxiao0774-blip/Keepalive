name: godlike-auto-alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: godlike-auto
  cancel-in-progress: false

jobs:
  godlike-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: godlike-auto/requirements.txt

      - name: 安装依赖
        working-directory: godlike-auto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: python -m playwright install --with-deps chromium

      - name: 运行 Godlike 自动启动脚本
        working-directory: godlike-auto
        env:
          # 注意：这里改成了读取 GODLIKE_ACCOUNTS
          ACCOUNTS: ${{ secrets.GODLIKE_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godlike-run-log
          path: |
            godlike-auto/run.log
            godlike-auto/debug_*.png
          if-no-files-found: ignore
          retention-days: 7
