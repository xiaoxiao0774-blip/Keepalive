name: VPS8 每日签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
          libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 libgl1

      - name: 安装 Python 依赖
        run: pip install seleniumbase requests loguru

      - name: 执行签到
        env:
          AI_API_KEY: ${{ vars.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL_NAME: ${{ vars.AI_MODEL_NAME }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          VPS8_EMAIL: ${{ vars.VPS8_EMAIL }}
          VPS8_PASSWORD: ${{ vars.VPS8_PASSWORD }}
        run: python vps8_checkin.py
